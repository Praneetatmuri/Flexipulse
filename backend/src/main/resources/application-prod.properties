# Production-ready DataSource Configuration
spring.application.name=flexipulse-prod

# Database Connection (Aiven MySQL)
# Using environment variables for Render injection
server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&verifyServerCertificate=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# 'update' is safe for initial cloud setup, we can switch to 'none' later
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Security
jwt.secret=${JWT_SECRET}
gemini.api.key=${GEMINI_API_KEY}

# Resilience / Performance Settings
server.tomcat.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# CORS
cors.allowed-origins=${FRONTEND_URL}
