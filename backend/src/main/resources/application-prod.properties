# ── Production Configuration ────────────────────────────────────
# Use this profile for production deployments
# Run with: mvn spring-boot:run -Dspring-boot.run.arguments="--spring.profiles.active=prod"

# ── Server ──────────────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:flexipulsedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 Console (Enable only in development) ──────────────────────
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── App name ─────────────────────────────────────────────────────
spring.application.name=flexipulse

# ── Gemini API Configuration ─────────────────────────────────────
# IMPORTANT: In production, ALWAYS use environment variables for sensitive data
# Never commit API keys to version control
gemini.api.key=${GEMINI_API_KEY}
gemini.model.name=gemini-pro
