# ── Server ──────────────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:flexipulsedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 Console (visit http://localhost:8080/h2-console) ──────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── App name ─────────────────────────────────────────────────────
spring.application.name=flexipulse

# ── Gemini API Configuration ─────────────────────────────────────
# Set GEMINI_API_KEY environment variable for secure key management
# Or configure in application-prod.properties for production
gemini.api.key=${GEMINI_API_KEY:}
gemini.model.name=gemini-2.5-flash

# JWT Configuration
jwt.secret=${JWT_SECRET:FlexiPulseSuperSecretKeyForJwtSigning1234567890}
jwt.expiration-ms=86400000
