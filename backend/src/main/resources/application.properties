# ── Server ──────────────────────────────────────────────────────
server.port=8080

# ── MySQL Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/flexipulse?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=flexipulse_user
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── App name ─────────────────────────────────────────────────────
spring.application.name=flexipulse

# ── CORS Configuration ───────────────────────────────────────────
# Allow requests from the Vite development server
cors.allowed-origins=http://localhost:5173

# ── Gemini API Configuration ─────────────────────────────────────
# Set GEMINI_API_KEY environment variable for secure key management
# Or configure in application-prod.properties for production
gemini.api.key=${GEMINI_API_KEY:}
gemini.model.name=gemini-2.5-flash

# JWT Configuration
jwt.secret=${JWT_SECRET:FlexiPulseSuperSecretKeyForJwtSigning1234567890}
jwt.expiration-ms=86400000
